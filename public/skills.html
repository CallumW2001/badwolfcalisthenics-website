<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gallery - Badwolf Calisthenics</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/skills.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

    <!-- Firebase Config -->
    <script src="js/firebase-config.js"></script>

    <script src="js/app.js" defer></script>
  </head>
  <body>
    <header class="hero">
      <div class="logo">
        <img
          src="images/badwolf_calisthenics_logo-removebg-preview.png"
          alt="Badwolf Calisthenics Logo"
        />
        <h1 class="main-title">Badwolf Calisthenics</h1>
      </div>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <!-- Added Home button -->
          <li><a href="about.html">About</a></li>
          <li><a href="reviews.html">Reviews</a></li>
          <li><a href="skills.html" class="active">Skills</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li class="nav-auth">
            <a href="login.html" id="sign-in-btn" class="button">Login</a>
            <a href="signup.html" id="sign-up-btn" class="button">Sign Up</a>
            <a
              href="index.html"
              id="logout-btn"
              class="button"
              style="display: none"

            >
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section>
        <h2>Skills</h2>
        <div class="gallery-grid">

          <img src="images/Room 2.jpg" alt="Calisthenics Pose 6" />

        </div>

    </main>

    <footer>
      <p>&copy; 2025 Badwolf Calisthenics. All rights reserved.</p>
    </footer>

    <script>
      document.querySelectorAll(".gallery-grid img").forEach((img, i) => {
        img.style.setProperty("--img-index", i);
      });
    </script>
  </body>
</html>
